name: Intervals Auto Coach

on:
  workflow_dispatch:
  schedule:
    - cron: "50 9 * * *"
      timezone: "Australia/Sydney"
    - cron: "0 23 * * *"
      timezone: "Australia/Sydney"

permissions:
  contents: write

concurrency:
  group: intervals-auto-coach
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          python scripts/fetch_intervals_auto.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Auto update coach data"
          git push
